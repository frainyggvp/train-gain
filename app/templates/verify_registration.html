{% extends "base.html" %}
{% block title %}Подтверждение регистрации - TrainGain{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Подтверждение регистрации</h2>
    <p class="muted-text">
        Мы отправили код на {{ pending_email }}.
    </p>

    <form method="POST">
        <input name="code" placeholder="Введите код из письма" required>
        <button type="submit" class="btn btn-primary">Подтвердить</button>
    </form>
</div>
{% endblock %}
