{% extends "base.html" %}
{% block title %}Вход - TrainGain{% endblock %}

{% block content %}
<div class="auth">
    <h2 class="auth__title">Вход</h2>

    <form method="POST">
        <input name="username" placeholder="Логин" required>
        <input name="password" type="password" placeholder="Пароль" required>
        <button type="submit" class="button button--primary">Войти</button>
    </form>

    <div class="auth__links">
        <a href="{{ url_for('auth.register') }}">Регистрация</a>
        <a href="{{ url_for('auth.reset_password') }}">Забыли пароль?</a>
    </div>
</div>
{% endblock %}
