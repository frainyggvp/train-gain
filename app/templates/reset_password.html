{% extends "base.html" %}

{% block title %}Восстановление пароля - TrainGain{% endblock %}

{% block content %}
<div class="auth">
    <h2>Восстановление пароля</h2>
    <p class="text text--muted">Введите email, привязанный к аккаунту. Мы отправим код подтверждения.</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Введите email" required>
        <button type="submit" class="button button--primary">Отправить код</button>
    </form>
</div>
{% endblock %}
