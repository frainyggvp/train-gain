{% extends "base.html" %}
{% block title %}Регистрация - TrainGain{% endblock %}

{% block content %}
<div class="auth">
    <h2 class="auth__title">Регистрация</h2>

    <form method="POST">
        <input name="username" placeholder="Логин" required>
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Пароль" required>
        <input name="password_confirm" type="password" placeholder="Повторите пароль" required>

        <p class="muted-text">
            Пароль должен быть не короче 8 символов, содержать только латинские буквы и цифры,
            а также включать хотя бы одну букву и одну цифру.
        </p>

        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('auth.login') }}">Уже есть аккаунт? Войти</a>
    </div>
</div>
{% endblock %}
